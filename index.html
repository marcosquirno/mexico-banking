<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nu Mexico KPI Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a18; padding: 24px 20px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6b6b67; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 18px 20px; }
  .card-title { font-size: 12px; font-weight: 500; color: #6b6b67; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
  .chart-wrap { position: relative; width: 100%; height: 230px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; font-size: 11px; color: #6b6b67; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .ld { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .lc { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<h1>Nu Mexico — KPI Dashboard</h1>
<p class="subtitle">Quarterly data · MXN $M · 1Q23–4Q25</p>
<div class="grid" id="g"></div>

<script>
const Q = ['1Q23','2Q23','3Q23','4Q23','1Q24','2Q24','3Q24','4Q24','1Q25','2Q25','3Q25','4Q25'];
const HARD_CAP = 250;

const BLUE   = '#378ADD';
const ORANGE = '#D85A30';
const GREEN  = '#1D9E75';

// Cap individual value: null if > HARD_CAP or specified per-series
const capVal = (v, seriesCap) => {
  const c = seriesCap !== undefined ? seriesCap : HARD_CAP;
  return (v === null || v === undefined || Math.abs(v) > c) ? null : v;
};
const capArr = (arr, seriesCap) => arr.map(v => capVal(v, seriesCap));

// Null out specific indices
const nullIdx = (arr, indices) => arr.map((v, i) => indices.includes(i) ? null : v);

const d = {
  ccLoans:    [13286,13313,13234,13467,14097,15109,16087,17341,18112,19718,22379,25812],
  ccYoY:      [null,null,null,-0.6,6.1,13.5,21.6,28.8,28.5,30.5,39.1,48.8],
  npLoans:    [null,null,null,62,382,738,1315,1948,2400,3387,4844,5197],
  npYoY:      [null,null,null,null,null,null,null,3038.4,528.1,358.8,268.3,166.7],
  grossLoans: [13286,13313,13234,13529,14479,15847,17403,19289,20513,23105,27223,31008],
  glYoY:      [null,null,null,-0.1,9.0,19.0,31.5,42.6,41.7,45.8,56.4,60.8],
  // loanDep: null out 1Q23(idx0), 2Q23(idx1), 3Q23(idx2) — all have crazy ratios
  loanDep:    [null,null,null,78.0,38.2,26.0,22.5,20.7,18.7,18.3,24.5,27.5],
  deposits:   [95,1536,2761,17354,37910,60954,77339,93021,109667,126197,110988,112613],
  depYoY:     [null,null,null,null,null,null,null,436.0,189.3,107.0,43.5,21.1],
  floatInc:   [277,260,258,350,789,1297,1757,1732,1953,2144,1905,1476],
  floatYield: [11.4,10.1,9.7,8.7,9.8,10.0,11.3,10.4,10.0,9.7,8.7,6.9],
  lendInc:    [1150,1188,1151,1188,1202,1598,1610,2101,2051,2370,2873,3420],
  lendYield:  [34.3,35.7,34.7,35.5,34.3,42.2,38.7,45.8,41.2,43.5,45.7,47.0],
  totInc:     [1238,1356,1163,1218,723,841,1286,1587,1484,1653,2624,3556],
  totYoY:     [null,null,null,null,null,null,10.5,30.3,105.3,96.5,104.0,124.1],
  intExp:     [494,488,623,842,1686,2506,3164,3208,3435,3866,3312,2597],
  // intExpDep: null out 1Q23(idx0), 2Q23(idx1), 3Q23(idx2)
  intExpDep:  [null,null,null,33.5,24.4,20.3,18.3,15.1,13.6,13.1,11.2,9.3],
  intExpIEA:  [8.5,8.3,10.4,11.4,14.6,14.9,16.1,15.1,14.0,14.0,11.7,9.1],
  nii:        [934,960,786,696,304,390,203,625,570,649,1465,2299],
  nim:        [16.2,16.3,13.2,9.4,2.6,2.3,1.0,2.9,2.3,2.4,5.2,8.0],
  prov:       [1113,1068,913,826,691,807,1106,1167,1162,1390,1444,1661],
  cor:        [33.2,32.1,27.5,24.7,19.7,21.3,26.6,25.4,23.4,25.5,23.0,22.8],
  gp:         [125,288,251,392,32,34,180,420,322,264,1180,1895],
  gpMgn:      [7.2,15.6,14.0,19.0,1.3,1.0,4.0,8.8,6.5,4.8,19.9,30.8],
  ga:         [538,507,701,747,791,780,930,936,1154,1430,1294,2277],
  gaRev:      [31.1,27.5,39.3,36.2,32.8,23.3,20.9,19.5,23.5,25.9,21.8,37.0],
  ni:         [-342,-149,-294,-363,-511,-481,-543,-457,-587,-809,-47,-530],
  niMgn:      [-19.8,-8.1,-16.4,-17.6,-21.2,-14.4,-12.2,-9.5,-11.9,-14.7,-0.8,-8.6],
};

function fmtBar(v) {
  if (v === null || v === undefined) return '';
  const abs = Math.abs(v);
  const s = v < 0 ? '-' : '';
  if (abs >= 1000) return s + '$' + (abs/1000).toFixed(1) + 'K';
  return s + '$' + Math.round(abs);
}
function fmtPct(v) { return (v !== null && v !== undefined) ? v.toFixed(1)+'%' : ''; }

// Compute clean step and axis max:
// step candidates in ascending order
const STEPS = [1,2,5,10,20,25,50,100,250];
function niceAxis(vals) {
  const nonNull = vals.filter(v => v !== null && v !== undefined);
  if (!nonNull.length) return { step: 10, min: 0, max: 50 };
  const rawMin = Math.min(...nonNull);
  const rawMax = Math.max(...nonNull);
  // pick step so we get ~5-8 ticks
  let step = STEPS.find(s => Math.ceil(rawMax / s) <= 8 && Math.ceil(rawMax / s) >= 3) || 250;
  // ensure max is strictly above rawMax (next step)
  const max = (Math.floor(rawMax / step) + 1) * step;
  const min = rawMin < 0 ? Math.floor(rawMin / step) * step : 0;
  return { step, min, max };
}

const charts = [
  {
    title: '1. Credit card loans & YoY growth',
    bar: { label: 'CC Loans ($M)', data: d.ccLoans },
    lines: [{ label: '% YoY Growth', data: capArr(d.ccYoY), color: ORANGE }]
  },
  {
    title: '2. Non-payroll loans & YoY growth',
    bar: { label: 'Non-Payroll Loans ($M)', data: d.npLoans },
    lines: [{ label: '% YoY Growth', data: capArr(d.npYoY), color: ORANGE }]
  },
  {
    title: '3. Gross loans, YoY growth & loan-to-deposit',
    bar: { label: 'Gross Loans ($M)', data: d.grossLoans },
    lines: [
      { label: '% YoY Growth', data: capArr(d.glYoY), color: ORANGE },
      { label: '% Loan to Deposit Ratio', data: d.loanDep, color: GREEN }
    ]
  },
  {
    title: '4. Deposits & YoY growth',
    bar: { label: 'Deposits ($M)', data: d.deposits },
    lines: [{ label: '% YoY Growth', data: capArr(d.depYoY), color: ORANGE }]
  },
  {
    title: '5. Float income & float gross yield',
    bar: { label: 'Float Income ($M)', data: d.floatInc },
    lines: [{ label: '% Float Gross Yield', data: d.floatYield, color: ORANGE }]
  },
  {
    title: '6. Lending income & lending gross yield',
    bar: { label: 'Lending Income ($M)', data: d.lendInc },
    lines: [{ label: '% Lending Gross Yield', data: d.lendYield, color: ORANGE }]
  },
  {
    title: '7. Total income & YoY growth',
    bar: { label: 'Total Income ($M)', data: d.totInc },
    lines: [{ label: '% YoY Growth', data: capArr(d.totYoY), color: ORANGE }]
  },
  {
    title: '8. Interest expense, % on deposits & % on IEA',
    bar: { label: 'Interest Expense ($M)', data: d.intExp },
    lines: [
      { label: '% on Deposits', data: d.intExpDep, color: ORANGE },
      { label: '% on IEA', data: d.intExpIEA, color: GREEN }
    ]
  },
  {
    title: '9. Net interest income & NIM',
    bar: { label: 'NII ($M)', data: d.nii },
    lines: [{ label: '% NIM', data: d.nim, color: ORANGE }]
  },
  {
    title: '10. Provisions & cost of risk',
    bar: { label: 'Provisions ($M)', data: d.prov },
    lines: [{ label: '% Cost of Risk on Loans', data: d.cor, color: ORANGE }]
  },
  {
    title: '11. Gross profit & margin',
    bar: { label: 'Gross Profit ($M)', data: d.gp },
    lines: [{ label: '% GP Margin', data: d.gpMgn, color: ORANGE }]
  },
  {
    title: '12. G&A & % of revenue',
    bar: { label: 'G&A ($M)', data: d.ga },
    lines: [{ label: '% of Revenue', data: d.gaRev, color: ORANGE }]
  },
  {
    title: '13. Net income & % margin',
    bar: { label: 'Net Income ($M)', data: d.ni },
    lines: [{ label: '% Net Margin', data: d.niMgn, color: ORANGE }]
  },
];

const container = document.getElementById('g');

charts.forEach((cfg, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  let legHtml = `<div class="legend"><span><span class="ld" style="background:${BLUE}"></span>${cfg.bar.label}</span>`;
  cfg.lines.forEach(l => { legHtml += `<span><span class="lc" style="background:${l.color}"></span>${l.label}</span>`; });
  legHtml += `</div>`;

  card.innerHTML = `<div class="card-title">${cfg.title}</div>${legHtml}<div class="chart-wrap"><canvas id="c${i}"></canvas></div>`;
  container.appendChild(card);

  const allPctVals = cfg.lines.flatMap(l => l.data.filter(v => v !== null && v !== undefined));
  const { step, min: pctMin, max: pctMax } = niceAxis(allPctVals);

  const barColors = cfg.bar.data.map(v => v === null ? 'transparent' : (v < 0 ? BLUE+'99' : BLUE+'cc'));

  const datasets = [
    {
      type: 'bar',
      label: cfg.bar.label,
      data: cfg.bar.data,
      backgroundColor: barColors,
      borderColor: cfg.bar.data.map(v => v === null ? 'transparent' : BLUE),
      borderWidth: 1,
      yAxisID: 'y',
      order: 2,
    },
    ...cfg.lines.map(l => ({
      type: 'line',
      label: l.label,
      data: l.data,
      borderColor: l.color,
      backgroundColor: l.color + '18',
      borderWidth: 2,
      pointRadius: 4,
      pointBackgroundColor: l.color,
      tension: 0.3,
      yAxisID: 'y2',
      order: 1,
      spanGaps: true,
    }))
  ];

  new Chart(document.getElementById(`c${i}`), {
    data: { labels: Q, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.raw === null || ctx.raw === undefined) return null;
              if (ctx.datasetIndex === 0) return ` ${cfg.bar.label}: ${fmtBar(ctx.raw)}`;
              return ` ${ctx.dataset.label}: ${fmtPct(ctx.raw)}`;
            }
          }
        }
      },
      layout: { padding: { top: 24 } },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 10 }, color: '#888', maxRotation: 45 }
        },
        y: {
          position: 'left',
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { size: 10 }, color: '#888',
            callback: v => {
              const abs = Math.abs(v);
              const s = v < 0 ? '-' : '';
              if (abs >= 1000) return s + '$' + (abs/1000).toFixed(0) + 'K';
              return s + '$' + abs;
            }
          }
        },
        y2: {
          position: 'right',
          min: pctMin,
          max: pctMax,
          grid: { drawOnChartArea: false },
          ticks: {
            stepSize: step,
            font: { size: 10 }, color: '#888',
            callback: (v, idx, ticks) => {
              if (idx === ticks.length - 1) return '';
              return v.toFixed(0) + '%';
            }
          }
        }
      }
    },
    plugins: [{
      id: 'barLabels',
      afterDatasetsDraw(chart) {
        const ds = chart.data.datasets[0];
        if (!ds) return;
        const meta = chart.getDatasetMeta(0);
        const ctx2 = chart.ctx;
        ctx2.save();
        ctx2.font = '500 9px -apple-system, sans-serif';
        ctx2.textAlign = 'center';
        meta.data.forEach((bar, idx) => {
          const val = ds.data[idx];
          if (val === null || val === undefined) return;
          const label = fmtBar(val);
          const x = bar.x;
          const y = val >= 0 ? bar.y - 4 : bar.y + 13;
          ctx2.fillStyle = '#555';
          ctx2.fillText(label, x, y);
        });
        ctx2.restore();
      }
    }]
  });
});
</script>
</body>
</html>
